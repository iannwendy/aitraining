version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ../models:/app/models             # Trained model weights
      - ../data:/app/data                 # CSV datasets (gold_review, final_dataset, etc.)
      - ../data_unified:/app/data_unified  # VSMEC cross-domain test
      - ./backend/data:/app/backend/data  # SQLite database
    environment:
      - PHOBERT_DEVICE=mps                # or cuda, cpu
      - HF_HUB_OFFLINE=1
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
